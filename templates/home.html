{% extends 'base.html' %}

{% block content %}
<div class="hero glass-card">
    <h1 class="hero-title">Find Your Perfect <span class="gradient-text">Companion</span></h1>
    <p class="hero-subtitle">Give a loving home to a pet in need. Discover your new best friend today!</p>
    
    <div class="hero-buttons">
        {% if current_user.is_authenticated %}
            <a href="{{ url_for('index') }}" class="btn-primary">View Available Pets</a>
        {% else %}
            <a href="{{ url_for('register') }}" class="btn-primary">Start Adopting</a>
            <a href="{{ url_for('login') }}" class="btn-secondary">Login</a>
        {% endif %}
    </div>
</div>
{% endblock %}
